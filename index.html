    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');

        .lego-panel {
            position: fixed;
            top: 10px;
            left: 10px;
            width: 270px;
            z-index: 9999;
            font-family: 'Nunito', 'Arial Black', sans-serif;
        }

        .lego-header {
            background: #ED1C24;
            color: white;
            padding: 12px 14px 10px;
            border-radius: 10px 10px 0 0;
            border: 3px solid #000;
            border-bottom: none;
            position: relative;
        }

        .lego-header::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 12px;
            width: 18px;
            height: 10px;
            background: #ED1C24;
            border-radius: 50% 50% 0 0;
            border: 3px solid #000;
            border-bottom: none;
        }

        .lego-header::after {
            content: '';
            position: absolute;
            top: -10px;
            left: 42px;
            width: 18px;
            height: 10px;
            background: #ED1C24;
            border-radius: 50% 50% 0 0;
            border: 3px solid #000;
            border-bottom: none;
        }

        .lego-header h2 {
            margin: 0;
            font-size: 15px;
            font-weight: 900;
            letter-spacing: 0.5px;
            line-height: 1.2;
            text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.3);
        }

        .lego-header p {
            margin: 4px 0 0;
            font-size: 11px;
            opacity: 0.9;
            font-weight: 700;
        }

        .lego-body {
            background: #FFDA00;
            border: 3px solid #000;
            border-top: none;
            padding: 10px 12px;
        }

        .lego-section {
            background: white;
            border: 2px solid #000;
            border-radius: 6px;
            padding: 8px 10px;
            margin-bottom: 8px;
        }

        .lego-section-title {
            font-size: 11px;
            font-weight: 900;
            color: #000;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 0 0 6px 0;
            border-bottom: 2px solid #ED1C24;
            padding-bottom: 4px;
        }

        .lego-legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 6px;
            border-radius: 4px;
            margin-bottom: 4px;
            font-size: 11px;
            font-weight: 700;
            border: 1.5px solid transparent;
        }

        .lego-legend-item.official {
            background: #ffe0e0;
            border-color: #ED1C24;
        }

        .lego-legend-item.certified-mf {
            background: #e8f4eb;
            border-color: #2ca02c;
        }

        .lego-legend-item.certified {
            background: #e0f0ff;
            border-color: #0055BF;
        }

        .lego-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid #000;
            flex-shrink: 0;
        }

        .lego-dot.red {
            background: #ED1C24;
        }

        .lego-dot.green {
            background: #2ca02c;
        }

        .lego-dot.blue {
            background: #0055BF;
        }

        .lego-stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            font-weight: 800;
            color: #000;
            padding: 3px 0;
        }

        .lego-stat-value {
            background: #ED1C24;
            color: white;
            padding: 1px 7px;
            border-radius: 10px;
            font-size: 11px;
            border: 1.5px solid #000;
        }

        .lego-progress-bar {
            width: 100%;
            height: 10px;
            background: #ddd;
            border-radius: 5px;
            border: 1.5px solid #000;
            margin: 6px 0 4px;
            overflow: hidden;
        }

        .lego-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ED1C24, #ffda00);
            border-radius: 5px;
            transition: width 0.4s ease;
        }

        .lego-filter-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 800;
            color: #000;
            margin-bottom: 5px;
            cursor: pointer;
        }

        .lego-filter-label input[type="checkbox"] {
            accent-color: #ED1C24;
            width: 14px;
            height: 14px;
            cursor: pointer;
        }

        .lego-btn {
            width: 100%;
            padding: 6px;
            border: 2px solid #000;
            border-radius: 5px;
            font-family: 'Nunito', 'Arial Black', sans-serif;
            font-weight: 900;
            font-size: 11px;
            cursor: pointer;
            margin-top: 4px;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 2px 2px 0 #000;
        }

        .lego-btn:active {
            transform: translate(2px, 2px);
            box-shadow: none;
        }

        .lego-btn-danger {
            background: #ED1C24;
            color: white;
        }

        .lego-footer {
            background: #000;
            color: #FFDA00;
            font-size: 10px;
            font-weight: 700;
            text-align: center;
            padding: 5px;
            border-radius: 0 0 8px 8px;
            border: 3px solid #000;
            border-top: none;
        }
    </style>

        <div class="lego-footer">
            Click a marker to mark as visited.

    // ============================================================================
    // MARKER ENHANCEMENT - Attach UI features to all markers after page load
    // ============================================================================
    function enhanceAllMarkers() {
        // Get all marker cluster groups from the map
        const clusters = [
            window.marker_cluster_4fca783c6f975db92c2d7ac91f46a560,  // Official stores
            window.marker_cluster_certified_mf,                      // Certified MF stores
            window.marker_cluster_88342d9fa36f2f8b3f1b210afad92b6a   // Other certified stores
        ].filter(c => c !== undefined);

        let markerCount = 0;

        clusters.forEach(cluster => {
            // Access cluster's internal markers array
            cluster.eachLayer(function (layer) {
                if (layer instanceof L.Marker) {
                    markerCount++;
                    const marker = layer;

                    // Determine store type
                    const storeType = cluster === window.marker_cluster_4fca783c6f975db92c2d7ac91f46a560 ? 'official' : 'certified';

                    // Extract store data from popup
                    const popup = marker.getPopup();
                    if (popup) {
                        const popupContent = popup.getContent();
                        let htmlText = '';

                        if (typeof popupContent === 'string') {
                            htmlText = popupContent;
                        } else if (popupContent instanceof HTMLElement) {
                            htmlText = popupContent.outerHTML;
                        }

                        // Extract store info
                        const nameMatch = htmlText.match(/<h4[^>]*>(.*?)<\/h4>/);
                        const cityMatch = htmlText.match(/<b>City:<\/b>\s*([^<]+)</);
                        const countryMatch = htmlText.match(/<b>Country:<\/b>\s*([^<]+)</);

                        if (nameMatch && cityMatch && countryMatch) {
                            let storeName = nameMatch[1].replace(/<[^>]*>/g, '').trim();
                            const cityText = cityMatch[1].trim();
                            const countryText = countryMatch[1].trim();

                            // Clean up store name (remove emoji)
                            storeName = storeName.replace(/[^\w\s-]/g, '').trim();
                            if (!storeName) storeName = 'Unknown Store';

                            // Create store ID
                            const storeId = `store_${markerCount}_${cityText.toLowerCase().replace(/\s+/g, '_')}`;

                            // Check if store has Minifigure Factory
                            const hasMF = htmlText.includes('Minifigure Factory') ||
                                htmlText.includes('Minifigure factory') ||
                                (storeType === 'official' && htmlText.includes('Confirmed'));
                            marker._hasMF = hasMF;

                            // Register marker in global registry
                            window.storeRegistry[storeId] = {
                                marker: marker,
                                storeId: storeId,
                                storeName: storeName,
                                city: cityText,
                                country: countryText,
                                storeType: storeType,
                                hasMF: hasMF,
                                cluster: cluster
                            };

                            // Hook into popup open event to inject button
                            marker.on('popupopen', function () {
                                setTimeout(() => {
                                    const popup = this.getPopup();
                                    if (popup) {
                                        enhancePopupWithButton(popup, storeId, storeName, cityText, countryText);
                                    }
                                }, 50);
                            });

                            // Apply correct icon based on visited state
                            const isVisited = VisitedStoresManager.isVisited(storeId);
                            const correctIcon = IconManager.getIcon(storeType, isVisited);
                            marker.setIcon(correctIcon);

                            // Enhance tooltip
                            const tooltipText = isVisited ? `${storeName} (✓ Visited)` : storeName;
                            marker.bindTooltip(tooltipText, { sticky: true });
                        }
                    }
                }
            });
        });

        console.log(`✓ Enhanced ${markerCount} LEGO store markers with visited tracking`);
    }

    function generateStoreSlug(storeName) {
        // For stores with secondary locations (e.g., "Dublin - Grafton Street"), use only the main location (first part)
        let baseName = storeName.split(/\s*[-–—]\s*/)[0];

        return baseName
            .replace(/^[^\w\s®]+\s*/u, '')                              // Remove leading emoji/symbols
            .replace(/^LEGO[®\xae]?\s+(?:Certified\s+)?Store\s+/i, '') // Remove "LEGO Store " prefix
            .toLowerCase()
            .replace(/\s*[–—-]+\s*/g, '-')                              // Normalize dashes
            .replace(/\s+/g, '-')
            .replace(/[^a-z0-9-]/g, '')
            .replace(/-+/g, '-')
            .replace(/^-|-$/g, '');
    }

        // Fallback to city-based slugs if not matched
        if (!slug) {
            const specialSlugs = {
                'Dublin': 'dublin',
                'LEGO Store London - Westfield': 'london-westfield',
                'LEGO Store London - Leicester Square': 'lsq',
                'LEGO Store London - Stratford': 'london-stratford',
                'LEGO Store Birmingham - Utilita Arena': 'utilita-arena',
                'LEGO Store Bluewater': 'bluewater'
            };
            slug = specialSlugs[city] || city.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        }

        if (!slug) slug = generateStoreSlug(storeName);  // Fallback to store name

        // Check for LEGOLAND stores with external URLs
        let storeUrl = '';
        if (storeName.includes('LEGOLAND Windsor')) {
            storeUrl = 'https://www.legoland.co.uk/explore/facilities/shopping/the-lego-store/';
        } else if (storeName.includes('LEGOLAND Deutschland')) {
            storeUrl = 'https://www.legoland.de/en/explore-legoland/restaurants-shops/shops/lego-shop/';
        } else if (storeName.includes('LEGOLAND Billund')) {
            storeUrl = 'https://www.legoland.dk/en/explore/eating-shopping/shopping/lego-shop/';
        } else {
            storeUrl = `https://www.lego.com/en-gb/stores/store/${slug}`;
        }

        if (!htmlText.includes('lego.com/stores/store/') && !htmlText.includes('legoland')) {
            htmlText = htmlText.replace(
                /(<h4[^>]*>)([\s\S]*?)(<\/h4>)/,
                `$1<a href="${storeUrl}" target="_blank" rel="noopener noreferrer" style="color:inherit;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px;" title="Open on LEGO website ↗">$2</a>$3`
            );
        }

        const isVisited = VisitedStoresManager.isVisited(storeId);
        const buttonText = isVisited ? '⊘ Mark as Unvisited' : '✓ Mark as Visited';
        const buttonColor = isVisited ? '#dc3545' : '#0055BF';

        const visitButton = `
                <button id="visit-btn-${storeId}"
                        onclick="toggleStoreVisited('${storeId}', '${storeName.replace(/'/g, "\\'")}', '${city.replace(/'/g, "\\'")}', '${country.replace(/'/g, "\\'")}')"
                        style="
                            margin-top: 8px;
                            padding: 8px 12px;
                            background-color: ${buttonColor};
                            color: white;
                            border: none;
                            border-radius: 4px;
                            cursor: pointer;
                            font-size: 12px;
                            width: 100%;
                            font-weight: bold;
                            transition: background-color 0.2s;
                        "
                        onmouseover="this.style.opacity='0.85'"
                        onmouseout="this.style.opacity='1'">
                    ${buttonText}
                </button>
            `;

        const enhancedContent = htmlText + visitButton;

        // Update popup content
        if (content instanceof HTMLElement) {
            content.innerHTML = enhancedContent;
        } else {
            popup.setContent(enhancedContent);
        }
    }

    // Initialize enhancements after markers are created
    setTimeout(() => {
        enhanceAllMarkers();

        // Restore MF-only filter state from localStorage
        const savedMFOnly = localStorage.getItem('lego_filter_mf_only');
        const mfCheckbox = document.getElementById('mf-only-filter');
        if (mfCheckbox) {
            // Default to true (checked) if no saved state exists
            const mfChecked = savedMFOnly === null ? true : savedMFOnly === 'true';
            mfCheckbox.checked = mfChecked;
            toggleMFOnlyFilter(mfCheckbox);
        }

        // Restore unvisited-only filter state from localStorage
        const savedUnvisited = localStorage.getItem('lego_filter_unvisited_only');
        const unvisitedCheckbox = document.getElementById('unvisited-filter');
        if (unvisitedCheckbox && savedUnvisited === 'true') {
            unvisitedCheckbox.checked = true;
            toggleUnvisitedFilter(unvisitedCheckbox);
        }
    }, 500);
    // ============================================================================
    // VISITED STORES MANAGER - Handle localStorage persistence
    // ============================================================================
    const VisitedStoresManager = {
        storageKey: 'lego_visited_stores',

        load() {
            const stored = localStorage.getItem(this.storageKey);
            return stored ? JSON.parse(stored) : {};
        },

        save(visited) {
            localStorage.setItem(this.storageKey, JSON.stringify(visited));
        },

        mark(storeId, storeData) {
            const visited = this.load();
            visited[storeId] = {
                name: storeData.name,
                city: storeData.city,
                country: storeData.country,
                visitedAt: new Date().toISOString()
            };
            this.save(visited);
            return visited[storeId];
        },

        unmark(storeId) {
            const visited = this.load();
            delete visited[storeId];
            this.save(visited);
        },

        isVisited(storeId) {
            return this.load().hasOwnProperty(storeId);
        },

        getAll() {
            return this.load();
        },

        clear() {
            localStorage.removeItem(this.storageKey);
        }
    };

    // Initialize on page load
    window.visitedStores = VisitedStoresManager.load();
    window.storeRegistry = {}; // Maps storeId to marker object

    // ============================================================================
    // ICON MANAGER - Handle different icon styles for visited/unvisited
    // ============================================================================
    const IconManager = {
        icons: {},

        init() {
            this.icons.official_unvisited = L.AwesomeMarkers.icon({
                markerColor: 'red',
                iconColor: 'white',
                icon: 'star',
                prefix: 'fa',
                extraClasses: 'fa-rotate-0'
            });

            this.icons.official_visited = L.AwesomeMarkers.icon({
                markerColor: 'darkred',
                iconColor: '#ffeb99',
                icon: 'check',
                prefix: 'fa',
                extraClasses: 'fa-rotate-0'
            });

            this.icons.certified_unvisited = L.AwesomeMarkers.icon({
                markerColor: 'blue',
                iconColor: 'white',
                icon: 'home',
                prefix: 'fa',
                extraClasses: 'fa-rotate-0'
            });

            this.icons.certified_visited = L.AwesomeMarkers.icon({
                markerColor: 'darkblue',
                iconColor: '#ffeb99',
                icon: 'check',
                prefix: 'fa',
                extraClasses: 'fa-rotate-0'
            });
        },

        getIcon(storeType, isVisited) {
            const key = `${storeType}_${isVisited ? 'visited' : 'unvisited'}`;
            return this.icons[key];
        }
    };

    IconManager.init();

    // ============================================================================
    // UTILITY FUNCTIONS
    // ============================================================================

    function generateStoreId(storeName, city, country) {
        return `store_${city.toLowerCase().replace(/\s+/g, '_')}_${country.toLowerCase().replace(/\s+/g, '_')}_${Math.random().toString(36).substr(2, 9)}`;
    }

    function showToastNotification(message) {
        const toastHtml = `
                <div class="toast" role="alert" style="position: fixed; top: 20px; right: 20px; z-index: 10000;">
                    <div class="toast-body" style="background-color: #28a745; color: white; border-radius: 4px; padding: 12px 16px; font-size: 14px;">
                        ${message}
                    </div>
                </div>
            `;
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = toastHtml;
        const toastElement = tempDiv.firstChild;
        document.body.appendChild(toastElement);

        setTimeout(() => {
            toastElement.style.opacity = '0';
            toastElement.style.transition = 'opacity 0.3s ease-out';
            setTimeout(() => toastElement.remove(), 300);
        }, 2500);
    }

    function updateMarkerAppearance(storeId) {
        const entry = window.storeRegistry[storeId];
        if (!entry) return;

        const marker = entry.marker || entry;
        if (!marker || !marker.setIcon) return;

        const isVisited = VisitedStoresManager.isVisited(storeId);
        const storeType = entry.storeType || 'certified';
        const newIcon = IconManager.getIcon(storeType, isVisited);
        marker.setIcon(newIcon);
    }

    function calculateStatistics(mfOnly = false) {
        const visited = VisitedStoresManager.getAll();
        const registry = window.storeRegistry;

        // Count total and visited stores
        let totalStores = 0;
        let visitedCount = 0;
        const countriesSet = new Set();

        Object.entries(registry).forEach(([storeId, entry]) => {
            const isMFStore = entry.hasMF || (entry.marker && entry.marker._hasMF);

            if (mfOnly && !isMFStore) return; // Skip non-MF stores if mfOnly filter

            totalStores++;
            if (visited[storeId]) {
                visitedCount++;
                if (entry.country) countriesSet.add(entry.country);
            }
        });

        const percentVisited = totalStores > 0 ? Math.round((visitedCount / totalStores) * 100) : 0;
        const countriesCount = countriesSet.size;

        return {
            visitedCount,
            totalStores,
            percentVisited,
            countriesCount,
            isMFOnly: mfOnly
        };
    }

    function updateSummaryPanel() {
        const isMFOnly = document.getElementById('mf-only-filter') ? document.getElementById('mf-only-filter').checked : false;
        const stats = calculateStatistics(isMFOnly);

        const elVisited = document.getElementById('stat-visited');
        const elBar = document.getElementById('stat-bar');
        const elPct = document.getElementById('stat-pct');
        const elCountries = document.getElementById('stat-countries');
        const elTitle = document.querySelector('#lego-summary-panel .lego-section-title');

        if (elVisited) elVisited.textContent = `${stats.visitedCount} / ${stats.totalStores}`;
        if (elBar) elBar.style.width = `${stats.percentVisited}%`;
        if (elPct) elPct.textContent = `${stats.percentVisited}%`;
        if (elCountries) elCountries.textContent = stats.countriesCount;
        if (elTitle) elTitle.textContent = isMFOnly ? '🏭 MF Progress' : 'Your Progress';
    }

    function clearAllVisitedWithConfirm() {
        if (confirm('Are you sure you want to clear all visited stores? This action cannot be undone.')) {
            VisitedStoresManager.clear();
            window.visitedStores = {};

            Object.keys(window.storeRegistry).forEach(storeId => {
                updateMarkerAppearance(storeId);
            });

            updateSummaryPanel();
            showToastNotification('✓ Cleared all visited stores');
        }
    }

    function toggleUnvisitedFilter(checkbox) {
        const isChecked = checkbox.checked;
        localStorage.setItem('lego_filter_unvisited_only', isChecked ? 'true' : 'false');
        Object.keys(window.storeRegistry).forEach(storeId => {
            const entry = window.storeRegistry[storeId];
            const marker = entry.marker ? entry.marker : entry;
            if (!marker) return;

            const isVisited = VisitedStoresManager.isVisited(storeId);
            marker.setOpacity(isChecked && isVisited ? 0.3 : 1);
        });
    }

    window._hiddenNonMFMarkers = [];

    function toggleMFOnlyFilter(checkbox) {
        localStorage.setItem('lego_filter_mf_only', checkbox.checked ? 'true' : 'false');
        const isChecked = checkbox.checked;
        const map = window.map_5dc165a63f01f128c58e883046fe30a7;
        const nonMFCluster = window.marker_cluster_88342d9fa36f2f8b3f1b210afad92b6a;
        const officialCluster = window.marker_cluster_4fca783c6f975db92c2d7ac91f46a560;

        if (isChecked) {
            // Remove the entire non-MF certified cluster
            if (map.hasLayer(nonMFCluster)) map.removeLayer(nonMFCluster);

            // Known UK non-MF official stores (fallback list)
            const nonMFStoreNames = ['Belfast', 'Utilita Arena', 'Battersea', 'Trafford Palazzo', 'Cribbs', 'Edinburgh', 'Glasgow', 'Newcastle', 'Bristol', 'Cardiff', 'Leeds', 'Sheffield', 'Milton Keynes', 'Oxford', 'Arndale', 'Trafford Centre', 'Brighton', 'Southampton', 'London - Stratford', 'London - Westfield', 'Bluewater', 'Hamburg', 'Westend', 'Arkad', 'River West', 'The Mall Athens', 'Blanchardstown', 'Arese', 'Assago', 'Bari', 'Bolzano', 'Torino Via Roma', 'Firenze', 'Genova', 'Palermo', 'Padova', 'Monza', 'Catania', 'Rimini', 'Euroma', 'Porta Nuova', 'Via Dante Milano', 'CC Adigeo', 'CC Campania', 'CC Il Centro', 'CC Il Centro Carugate', 'CC Le Gru', 'CC Le Vele', 'CC Megalo', 'CC Nave de Vero', 'CC Orio Center', 'The Hague', 'Mall of the Netherlands', 'Rotterdam', 'Utrecht', 'Poznań', 'Warszawa', 'Mokotów', 'Kraków', 'Gdańsk', 'Wrocław', 'Katowice', 'Łódź', 'AFI Cotroceni', 'AFI Ploiesti', 'City Park', 'Coresi', 'Mega Mall', 'Park Lake', 'Promenada', 'Sun Plaza', 'VIVO', 'Ljubljana', 'Akasya', 'Ankamall', 'Hilltown', 'Kanyon'];

            // Collect ALL markers from official cluster, then separate MF from non-MF
            const allMarkers = [];
            const mfMarkers = [];
            const nonMFMarkers = [];

            officialCluster.eachLayer(function (marker) {
                if (marker instanceof L.Marker) {
                    allMarkers.push(marker);

                    // Determine if non-MF: check _hasMF flag OR hardcoded store names
                    let isNonMF = marker._hasMF === false;

                    // Fallback: check popup title against known non-MF stores
                    if (!isNonMF && marker.getPopup()) {
                        const popupTitle = marker.getPopup().getContent();
                        if (typeof popupTitle === 'string') {
                            isNonMF = nonMFStoreNames.some(name => popupTitle.includes(name));
                        } else if (popupTitle instanceof HTMLElement) {
                            const titleText = popupTitle.outerHTML || popupTitle.textContent || '';
                            isNonMF = nonMFStoreNames.some(name => titleText.includes(name));
                        }
                    }

                    if (isNonMF) {
                        nonMFMarkers.push(marker);
                    } else {
                        mfMarkers.push(marker);
                    }
                }
            });

            // Store non-MF markers for restoration
            window._hiddenNonMFMarkers = nonMFMarkers;

            // Clear official cluster completely
            officialCluster.clearLayers();

            // Re-add ONLY MF markers to cluster
            mfMarkers.forEach(m => officialCluster.addLayer(m));

            showToastNotification(`🏭 Showing ${mfMarkers.length} MF official stores (hiding ${nonMFMarkers.length})`);
        } else {
            // Clear cluster and rebuild with all markers
            const allMarkers = [];
            officialCluster.eachLayer(function (marker) {
                if (marker instanceof L.Marker) {
                    allMarkers.push(marker);
                }
            });

            // Re-add non-MF certified cluster
            if (!map.hasLayer(nonMFCluster)) nonMFCluster.addTo(map);

            // Clear and rebuild official cluster with all (MF + non-MF) markers
            officialCluster.clearLayers();
            allMarkers.forEach(m => officialCluster.addLayer(m));
            window._hiddenNonMFMarkers.forEach(m => officialCluster.addLayer(m));
            window._hiddenNonMFMarkers = [];

            showToastNotification('📍 Showing all stores');
        }

        updateSummaryPanel();
    }

    // Summary panel is now static HTML in the LEGO side panel
    // updateSummaryPanel() updates the individual stat elements by ID

    // ============================================================================
    // ADD FILTER CHECKBOX TO LAYER CONTROL
    // ============================================================================
    function addUnvisitedFilterCheckbox() {
        // Filters are in the LEGO side panel — nothing to inject into layer control
    }

    // ============================================================================
    // ENHANCE POPUPS WITH VISIT BUTTON - Intercept popup creation
    // ============================================================================
    function injectVisitButton(marker, storeId, storeName, city, country) {
        const originalPopup = marker.getPopup();
        if (!originalPopup) return;

        const originalContent = originalPopup.getContent();
        let htmlContent = originalContent;

        if (typeof originalContent === 'string') {
            htmlContent = originalContent;
        } else if (originalContent instanceof HTMLElement) {
            htmlContent = originalContent.outerHTML;
        }

        const isVisited = VisitedStoresManager.isVisited(storeId);
        const buttonText = isVisited ? '⊘ Mark as Unvisited' : '✓ Mark as Visited';
        const buttonColor = isVisited ? '#dc3545' : '#0055BF';

        const visitButton = `
                <button id="visit-btn-${storeId}"
                        onclick="toggleStoreVisited('${storeId}', '${storeName}', '${city}', '${country}')"
                        style="
                            margin-top: 8px;
                            padding: 8px 12px;
                            background-color: ${buttonColor};
                            color: white;
                            border: none;
                            border-radius: 4px;
                            cursor: pointer;
                            font-size: 12px;
                            width: 100%;
                            font-weight: bold;
                            transition: background-color 0.2s;
                        "
                        onmouseover="this.style.opacity='0.85'"
                        onmouseout="this.style.opacity='1'">
                    ${buttonText}
                </button>
            `;

        const enhancedContent = htmlContent + visitButton;
        originalPopup.setContent(enhancedContent);
    }

    function toggleStoreVisited(storeId, storeName, city, country) {
        const registryEntry = window.storeRegistry[storeId];
        if (!registryEntry) return;

        const marker = registryEntry.marker;
        const isVisited = VisitedStoresManager.isVisited(storeId);

        // Update visited state
        if (isVisited) {
            VisitedStoresManager.unmark(storeId);
            showToastNotification('⊘ Unmarked as Visited');
        } else {
            VisitedStoresManager.mark(storeId, { name: storeName, city, country });
            showToastNotification('✓ Marked as Visited!');
        }

        // Update marker icon
        const newIsVisited = VisitedStoresManager.isVisited(storeId);
        const correctIcon = IconManager.getIcon(registryEntry.storeType, newIsVisited);
        marker.setIcon(correctIcon);

        // Update tooltip
        const tooltipText = newIsVisited ? `${storeName} (✓ Visited)` : storeName;
        marker.setTooltipContent(tooltipText);

        // Close and reopen popup to show updated button
        if (marker.isPopupOpen && marker.isPopupOpen()) {
            marker.closePopup();
            setTimeout(() => {
                enhancePopupWithButton(marker.getPopup(), storeId, storeName, city, country);
                marker.openPopup();
            }, 100);
        }

        // Update summary panel
        updateSummaryPanel();
    }

    // Make it globally accessible
    window.toggleStoreVisited = toggleStoreVisited;

    // ============================================================================
    // INITIALIZE AFTER DOM IS READY
    // ============================================================================
    function initUI() {
        addUnvisitedFilterCheckbox();
        updateSummaryPanel();
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initUI);
    } else {
        initUI();
    }
</script>
